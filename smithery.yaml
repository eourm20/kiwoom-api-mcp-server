# Smithery configuration file: https://smithery.ai/docs/build/project-config
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      note:
        type: string
        description: This server reads Kiwoom credentials and KIWOOM_BASE_URL from a local .env file on the user's machine.
  commandFunction: |-
    () => ({
      command: 'python',
      args: ['-m', 'kiwoom_mcp.server'],
      env: {
        MCP_TRANSPORT: 'stdio'
      }
    })
